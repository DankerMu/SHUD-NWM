# nginx vhost: test.nwm.ac.cn -> NHMS display_readonly service (node-27)
#
# 现状（探测于 2026-06-12）:
#   - DNS test.nwm.ac.cn -> 210.77.77.27 已设置。
#   - node-27 上 NHMS display 服务以 nwm 用户跑 uvicorn apps.api.main:app，监听
#     0.0.0.0:8080（FastAPI 同源服务前端 dist + display API，service_role=display_readonly）。
#   - 宿主 nginx(1.28) 持有 :80/:443，服务多个 *.ac.cn / shud.vip 生产站点。
#   - 当前 test.nwm.ac.cn 无匹配 server，回落到默认 server（docmost 证书，不匹配 + 502），
#     所以必须新增本 vhost。
#
# 应用步骤（需 node-27 root；nwm 用户无免密 sudo，须由宿主管理员或经 ! 提权执行）:
#   1. 签发证书（test.nwm.ac.cn 不在现有证书 SAN 内，需单签）:
#        sudo certbot --nginx -d test.nwm.ac.cn
#      若 ACME 出站受限（node-27 出站 443 曾对 github 超时），改用已能联网的方式签发后
#      把证书放到 /etc/letsencrypt/live/test.nwm.ac.cn/ 再用本静态 vhost。
#   2. 安装本文件:
#        sudo install -m 0644 infra/nginx/test.nwm.ac.cn.conf /etc/nginx/conf.d/test.nwm.ac.cn.conf
#   3. 校验并热加载（不影响其它站点）:
#        sudo nginx -t && sudo systemctl reload nginx
#   4. live receipt:
#        curl -sS https://test.nwm.ac.cn/api/v1/runtime/config   # 期望 service_role=display_readonly
#
# 若用 `certbot --nginx -d test.nwm.ac.cn` 自动脚手架，certbot 会生成 443 server 块；
# 只需把其 `location /` 改成下面的 proxy_pass 即可，无需手装本文件。

server {
    listen 80;
    server_name test.nwm.ac.cn;
    # certbot http-01 验证目录（首次签发用）
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name test.nwm.ac.cn;

    access_log /var/log/nginx/test.nwm.ac.cn.access.log;
    error_log  /var/log/nginx/test.nwm.ac.cn.error.log;

    ssl_certificate     /etc/letsencrypt/live/test.nwm.ac.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test.nwm.ac.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # NHMS display 服务同源提供前端 dist + display API，统一反代到本机 8080。
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
