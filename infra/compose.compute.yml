name: nhms-compute

x-compute-env: &compute-env
  NHMS_SERVICE_ROLE: compute_control
  NHMS_REQUIRE_SERVICE_ROLE: "true"
  NHMS_AUTH_MODE: ${NHMS_AUTH_MODE:-production}
  NHMS_REQUIRE_FORECAST_WARM_START: ${NHMS_REQUIRE_FORECAST_WARM_START:-true}
  UV_CACHE_DIR: /tmp/nhms-uv-cache
  DATABASE_URL: ${DATABASE_URL:?set compute writer database url}
  WORKSPACE_ROOT: ${WORKSPACE_ROOT:?set compute workspace root}
  OBJECT_STORE_ROOT: ${OBJECT_STORE_ROOT:-}
  OBJECT_STORE_PREFIX: ${OBJECT_STORE_PREFIX:-}
  NHMS_OBJECT_STORE_COPYBACK_ROOT: ${NHMS_OBJECT_STORE_COPYBACK_ROOT:?set shared object-store copyback root}
  NHMS_PUBLISHED_ARTIFACT_ROOT: ${NHMS_PUBLISHED_ARTIFACT_ROOT:?set container published artifact root}
  NHMS_PUBLISHED_ARTIFACT_URI_PREFIX: ${NHMS_PUBLISHED_ARTIFACT_URI_PREFIX:-published://}
  NHMS_PUBLISHED_ARTIFACT_S3_BUCKET: ${NHMS_PUBLISHED_ARTIFACT_S3_BUCKET:-}
  NHMS_PUBLISHED_ARTIFACT_S3_PREFIX: ${NHMS_PUBLISHED_ARTIFACT_S3_PREFIX:-}
  NHMS_SCHEDULER_LOCK_ROOT: ${NHMS_SCHEDULER_LOCK_ROOT:?set scheduler lock root under WORKSPACE_ROOT}
  NHMS_SCHEDULER_EVIDENCE_ROOT: ${NHMS_SCHEDULER_EVIDENCE_ROOT:?set scheduler evidence root under WORKSPACE_ROOT}
  NHMS_SCHEDULER_RUNTIME_ROOT: ${NHMS_SCHEDULER_RUNTIME_ROOT:?set scheduler runtime root}
  NHMS_SCHEDULER_TEMP_ROOT: ${NHMS_SCHEDULER_TEMP_ROOT:?set scheduler temp root}
  NHMS_SCHEDULER_ALLOWED_ROOTS: ${NHMS_SCHEDULER_ALLOWED_ROOTS:?set non-empty scheduler approved roots}
  NHMS_BASINS_ROOT: ${NHMS_BASINS_ROOT:?set Basins root}
  NHMS_MODEL_ASSET_ROOT: ${NHMS_MODEL_ASSET_ROOT:?set model asset root}
  SHUD_EXECUTABLE: ${SHUD_EXECUTABLE:-}
  SLURM_GATEWAY_URL: ${SLURM_GATEWAY_URL:-}
  SLURM_GATEWAY_BACKEND: ${SLURM_GATEWAY_BACKEND:-}
  SLURM_GATEWAY_TEMPLATE_DIR: ${SLURM_GATEWAY_TEMPLATE_DIR:-infra/sbatch}
  SLURM_GATEWAY_WORKSPACE_DIR: ${SLURM_GATEWAY_WORKSPACE_DIR:-${WORKSPACE_ROOT}}
  NHMS_SCHEDULER_SOURCES: ${NHMS_SCHEDULER_SOURCES:-gfs,IFS}
  NHMS_SCHEDULER_MODEL_IDS: ${NHMS_SCHEDULER_MODEL_IDS:-}
  NHMS_SCHEDULER_BASIN_IDS: ${NHMS_SCHEDULER_BASIN_IDS:-}
  NHMS_SCHEDULER_ALLOWED_CYCLE_HOURS_UTC: ${NHMS_SCHEDULER_ALLOWED_CYCLE_HOURS_UTC-0,12}
  NHMS_SCHEDULER_INTERVAL_SECONDS: ${NHMS_SCHEDULER_INTERVAL_SECONDS:-300}
  NHMS_SCHEDULER_MAX_PASSES: ${NHMS_SCHEDULER_MAX_PASSES:-1}
  NHMS_SCHEDULER_MAX_CYCLES_PER_SOURCE: ${NHMS_SCHEDULER_MAX_CYCLES_PER_SOURCE:-1}
  GFS_CYCLE_HOURS_UTC: ${GFS_CYCLE_HOURS_UTC-0,12}
  IFS_CYCLE_HOURS_UTC: ${IFS_CYCLE_HOURS_UTC-0,12}
  GFS_NOMADS_BASE_URL: ${GFS_NOMADS_BASE_URL:-}
  IFS_OPEN_DATA_SOURCE: ${IFS_OPEN_DATA_SOURCE:-ecmwf}

x-compute-volumes: &compute-volumes
  - type: bind
    source: ${WORKSPACE_ROOT:?set compute workspace root}
    target: ${WORKSPACE_ROOT:?set compute workspace root}
  - type: bind
    source: ${OBJECT_STORE_ROOT:?set compute object store root}
    target: ${OBJECT_STORE_ROOT:?set compute object store root}
  - type: bind
    source: ${NHMS_OBJECT_STORE_COPYBACK_ROOT:?set shared object-store copyback root}
    target: ${NHMS_OBJECT_STORE_COPYBACK_ROOT:?set shared object-store copyback root}
  - type: bind
    source: ${NHMS_SCHEDULER_RUNTIME_ROOT:?set scheduler runtime root}
    target: ${NHMS_SCHEDULER_RUNTIME_ROOT:?set scheduler runtime root}
  - type: bind
    source: ${NHMS_SCHEDULER_TEMP_ROOT:?set scheduler temp root}
    target: ${NHMS_SCHEDULER_TEMP_ROOT:?set scheduler temp root}
  - type: bind
    source: ${NHMS_PUBLISHED_ARTIFACT_HOST_ROOT:?set host published artifact root}
    target: ${NHMS_PUBLISHED_ARTIFACT_ROOT:?set container published artifact root}
  - type: bind
    source: ${NHMS_BASINS_ROOT:?set Basins root}
    target: ${NHMS_BASINS_ROOT:?set Basins root}
    read_only: true
  - type: bind
    source: ${NHMS_MODEL_ASSET_ROOT:?set model asset root}
    target: ${NHMS_MODEL_ASSET_ROOT:?set model asset root}
    read_only: true

services:
  compute-api:
    image: ${NHMS_APP_IMAGE:-nhms-app}:${NHMS_IMAGE_TAG:-m22-placeholder}
    user: "${NHMS_CONTAINER_UID:-1000}:${NHMS_CONTAINER_GID:-1000}"
    group_add:
      - "${NHMS_SUPPLEMENTAL_GID:-1107}"
    working_dir: /app
    init: true
    environment: *compute-env
    volumes: *compute-volumes
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8000"
    command:
      - uv
      - run
      - python
      - -m
      - uvicorn
      - apps.api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    restart: unless-stopped

  # scheduler-once: the generic production scheduler/daemon lane (M24). This runs
  # `nhms-pipeline plan-production` (-> services/orchestrator/scheduler.py), which
  # submits through the Slurm gateway. This is the production runner; the legacy
  # run_qhh_* scripts are diagnostic-only fallbacks (M24 §5 / #293). Add
  # `--continuous` (see nhms-compute-scheduler.timer in the systemd docs) for the
  # bounded continuous daemon.
  scheduler-once:
    image: ${NHMS_APP_IMAGE:-nhms-app}:${NHMS_IMAGE_TAG:-m22-placeholder}
    profiles: ["manual"]
    user: "${NHMS_CONTAINER_UID:-1000}:${NHMS_CONTAINER_GID:-1000}"
    group_add:
      - "${NHMS_SUPPLEMENTAL_GID:-1107}"
    working_dir: /app
    init: true
    environment: *compute-env
    volumes: *compute-volumes
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - uv
      - run
      - nhms-pipeline
      - plan-production
      - --plan
    restart: "no"
