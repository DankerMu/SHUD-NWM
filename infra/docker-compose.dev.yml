version: "3.9"

services:
  db:
    image: timescale/timescaledb-ha:pg15-latest
    container_name: nhms-db
    environment:
      POSTGRES_DB: nhms
      POSTGRES_USER: nhms
      POSTGRES_PASSWORD: nhms_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nhms -d nhms"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2024-03-15T01-07-19Z
    container_name: nhms-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio-init:
    image: minio/mc:RELEASE.2024-03-13T23-51-57Z
    container_name: nhms-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/nhms &&
        echo 'Bucket nhms created or already exists'
      "

volumes:
  pgdata:
  minio-data:
