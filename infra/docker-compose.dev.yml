version: "3.9"

services:
  db:
    image: timescale/timescaledb-ha:pg15-latest
    container_name: nhms-db
    environment:
      POSTGRES_DB: nhms
      POSTGRES_USER: nhms
      POSTGRES_PASSWORD: nhms_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nhms -d nhms"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2024-03-15T01-07-19Z
    container_name: nhms-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio-init:
    image: minio/mc:RELEASE.2024-03-13T23-51-57Z
    container_name: nhms-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/nhms &&
        echo 'Bucket nhms created or already exists'
      "

  m1-worker:
    image: python:3.11-slim
    container_name: nhms-m1-worker
    working_dir: /app
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://nhms:nhms_dev@db:5432/nhms
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET_NAME: nhms
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      GFS_NOMADS_BASE_URL: https://nomads.ncep.noaa.gov/pub/data/nccf/com/gfs/prod
      WORKSPACE_ROOT: /work/nhms
      OBJECT_STORE_PREFIX: s3://nhms
    volumes:
      - ..:/app
      - worker-workspace:/work/nhms
    command: ["sleep", "infinity"]

volumes:
  pgdata:
  minio-data:
  worker-workspace:
