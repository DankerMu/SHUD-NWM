name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Cancel superseded runs on the same PR/branch — stop stacked re-runs when you push repeatedly.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Path scoping: each job below runs only when its area changed, so a frontend-only or docs-only PR
  # never pays the backend pytest or real-DB dry run, and a backend PR never pays the frontend build.
  # master is unprotected (no required status checks), so a skipped job does not deadlock merge.
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      database: ${{ steps.filter.outputs.database }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docs: ${{ steps.filter.outputs.docs }}
      openapi: ${{ steps.filter.outputs.openapi }}
      schemas: ${{ steps.filter.outputs.schemas }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - '**/*.py'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'tests/**'
              - 'packages/**'
              - 'apps/api/**'
              - 'services/**'
              - 'workers/**'
              - 'infra/**'
              - 'schemas/**'
              - 'db/**'
              - 'scripts/validate_*.py'
            database:
              - 'db/**'
              - 'packages/common/migrate.py'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'tests/conftest.py'
              - 'tests/integration_helpers.py'
              - 'tests/*integration*.py'
              - 'tests/**/*integration*.py'
              - 'tests/test_basins_registry_import.py'
              - 'tests/test_basins_reingest.py'
              - 'tests/test_migrations.py'
              - 'tests/test_qhh_production_bootstrap.py'
              - 'tests/test_real_*.py'
              - 'tests/test_worker_chain_smoke.py'
            frontend:
              - 'apps/frontend/**'
              - 'openapi/**'
            docs:
              - 'docs/**'
            openapi:
              - 'openapi/**'
            schemas:
              - 'schemas/**'

  markdown-lint:
    name: Markdown Lint
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "docs/**/*.md"

  openapi-validate:
    name: OpenAPI Validate
    needs: changes
    if: needs.changes.outputs.openapi == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npx --yes @redocly/cli@1.25.13 lint openapi/nhms.v1.yaml --skip-rule no-unused-components
        if: hashFiles('openapi/nhms.v1.yaml') != ''
      - run: echo "openapi/nhms.v1.yaml not found — skipping validation"
        if: hashFiles('openapi/nhms.v1.yaml') == ''

  json-schema-validate:
    name: JSON Schema Validate
    needs: changes
    if: needs.changes.outputs.schemas == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install check-jsonschema
        run: pip install check-jsonschema>=0.29.0
      - name: Meta-validate schemas
        run: |
          SCHEMAS=$(find schemas/ -name '*.schema.json' 2>/dev/null)
          if [ -z "$SCHEMAS" ]; then
            echo "No schema files found — skipping"
            exit 0
          fi
          for schema in $SCHEMAS; do
            echo "Validating $schema ..."
            check-jsonschema --check-metaschema "$schema"
          done
      - name: Validate examples against schemas
        run: |
          for example in schemas/examples/*.json; do
            [ -f "$example" ] || { echo "No example files — skipping"; exit 0; }
            base=$(basename "$example" .example.json)
            schema="schemas/${base}.schema.json"
            if [ -f "$schema" ]; then
              echo "Validating $example against $schema ..."
              check-jsonschema --schemafile "$schema" "$example"
            else
              echo "WARNING: No schema found for $example (expected $schema)"
            fi
          done

  # Merge-gate database suite. PR and push runs are limited to migration, database,
  # integration-test, or dependency surfaces; workflow_dispatch remains an explicit
  # real-DB dry-run escape hatch. Full unit pytest is reserved for push-to-master or
  # manual workflow_dispatch; PRs run the focused unit-test job below.
  real-db-integration:
    name: SQL Migration Dry Run
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        needs.changes.outputs.database == 'true' &&
        (github.event_name == 'push' || github.event.pull_request.draft == false)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      db:
        image: timescale/timescaledb-ha:pg15-latest
        env:
          POSTGRES_DB: nhms
          POSTGRES_USER: nhms
          POSTGRES_PASSWORD: nhms_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nhms -d nhms"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 15s
    env:
      DATABASE_URL: postgresql://nhms:nhms_dev@localhost:5432/nhms
      NHMS_RUN_INTEGRATION: "1"
      NHMS_INTEGRATION_DATABASE_URL: postgresql://nhms:nhms_dev@localhost:5432/nhms
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run real database integration tests
        run: pytest -q -m integration

  unit-test:
    name: Unit Tests (full)
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (needs.changes.outputs.backend == 'true' && github.event_name == 'push')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Prepare scratch evidence root
        run: |
          sudo mkdir -p /scratch/frd_muziyao
          sudo chown "$USER:$(id -gn)" /scratch/frd_muziyao
          chmod u+rwx /scratch/frd_muziyao
      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short -m "not e2e and not grib and not integration"

  # PR merge gate: run a focused suite derived from changed files. The selector maps runtime
  # modules/config surfaces to their owning tests and falls back to core smoke tests for unknown
  # backend Python paths. Full unit tests still run on master and on manual workflow_dispatch.
  unit-test-targeted:
    name: Unit Tests
    needs: changes
    if: >-
      needs.changes.outputs.backend == 'true' &&
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Prepare scratch evidence root
        run: |
          sudo mkdir -p /scratch/frd_muziyao
          sudo chown "$USER:$(id -gn)" /scratch/frd_muziyao
          chmod u+rwx /scratch/frd_muziyao
      - name: Select targeted tests
        id: targeted
        run: |
          python scripts/select_ci_tests.py --base-ref "${GITHUB_BASE_REF}" --github-output "$GITHUB_OUTPUT"
      - name: Run targeted tests
        env:
          TARGETED_TESTS_JSON: ${{ steps.targeted.outputs.tests_json }}
        run: |
          if [ "${{ steps.targeted.outputs.count }}" != "0" ]; then
            python -c 'import json, os, subprocess; tests = json.loads(os.environ["TARGETED_TESTS_JSON"]); print("Targeted test files:"); [print(f"  {test}") for test in tests]; subprocess.run(["pytest", "-q", *tests], check=True)'
          else
            echo "No backend test files selected — running collect-only smoke (import/syntax across suite)"
            pytest tests/ -q --collect-only >/dev/null
          fi

  frontend-build:
    name: Frontend Build
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      - name: Install, build, and test frontend
        run: cd apps/frontend && pnpm install --frozen-lockfile && pnpm build && pnpm test
      - name: Check frontend bundle size
        run: cd apps/frontend && pnpm check:bundle
