name: Governance Audit

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: governance-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  entropy-audit:
    name: Entropy Audit (report-only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5

      - name: Generate entropy reports
        env:
          STRUCTURAL_REQUESTED_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event_name == 'push' && github.event.before || 'origin/master' }}
        run: |
          set -eu
          mkdir -p artifacts/governance
          STRUCTURAL_BASE_REF="$STRUCTURAL_REQUESTED_BASE_REF"
          ZERO_SHA=0000000000000000000000000000000000000000
          if [ "$STRUCTURAL_BASE_REF" = "origin/master" ]; then
            git fetch --no-tags --depth=1 origin master
            STRUCTURAL_BASE_REF=FETCH_HEAD
          elif [ -n "$STRUCTURAL_BASE_REF" ] && [ "$STRUCTURAL_BASE_REF" != "$ZERO_SHA" ]; then
            git fetch --no-tags --depth=1 origin "$STRUCTURAL_BASE_REF"
            STRUCTURAL_BASE_REF=FETCH_HEAD
          else
            git fetch --no-tags --depth=1 origin master
            STRUCTURAL_BASE_REF=FETCH_HEAD
          fi
          uv run python scripts/governance/audit_repo_entropy.py --format json \
            --structural-base-ref "$STRUCTURAL_BASE_REF" \
            > artifacts/governance/entropy-report.json
          uv run python scripts/governance/audit_repo_entropy.py --format markdown \
            --structural-base-ref "$STRUCTURAL_BASE_REF" \
            > artifacts/governance/entropy-report.md

      - name: Verify report contract
        run: |
          test -s artifacts/governance/entropy-report.json
          test -s artifacts/governance/entropy-report.md
          uv run python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("artifacts/governance/entropy-report.json").read_text())
          metadata = report["metadata"]
          assert metadata["mode"] == "report-only", metadata
          assert metadata["baseline_written"] is False, metadata
          comparison_base = metadata["structural_file_budget"]["comparison_base_ref"]
          assert comparison_base["resolved"], comparison_base
          assert comparison_base["ref_kind"] != "head", comparison_base
          PY

      - name: Verify entropy baseline was not written
        run: |
          git diff --exit-code -- .entropy-baseline/latest.json
          test -z "$(git status --porcelain -- .entropy-baseline/latest.json)"

      - name: Add governance report summary
        run: |
          {
            echo "## Governance entropy audit"
            echo ""
            echo "- JSON report: \`artifacts/governance/entropy-report.json\`"
            echo "- Markdown report: \`artifacts/governance/entropy-report.md\`"
            echo "- Mode: \`report-only\`"
            echo ""
            cat artifacts/governance/entropy-report.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload governance entropy reports
        uses: actions/upload-artifact@v4
        with:
          name: governance-entropy-reports
          path: |
            artifacts/governance/entropy-report.json
            artifacts/governance/entropy-report.md
          if-no-files-found: error
          retention-days: 14
