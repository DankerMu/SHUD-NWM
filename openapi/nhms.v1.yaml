openapi: "3.0.3"
info:
  title: "National Hydrological Simulation System API"
  version: "1.0.0"
  license:
    name: "Proprietary"
    url: "https://example.com/proprietary-license"
  description: |
    NHMS API - 全国水文模拟系统。Auth implementation deferred to M1+.

    ## Roles
    - viewer: read-only access to public dashboards
    - analyst: read access to detailed data, timeseries, lineage
    - operator: trigger retries, cancel runs, manage pipeline
    - model_admin: create/update models, basin versions, calibration
    - sys_admin: full system administration
    - developer: development/debugging endpoints

    ## Non-Functional Requirements
    - List/query endpoints: P95 <= 200ms
    - Detail endpoints: P95 <= 100ms
    - Timeseries endpoints: P95 <= 500ms
    - Tile endpoints: P95 <= 300ms
    - Pipeline status: P95 <= 200ms
    - Flood alerts: P95 <= 300ms

    ## Conventions
    - All timestamps: ISO 8601 UTC
    - Pagination: limit/offset query parameters
    - Rate limiting: placeholder (not enforced in M0)
servers:
  - url: /
security:
  - BearerAuth: []
tags:
  - name: basins
    description: Basin, basin version, and river segment discovery.
  - name: models
    description: Model registry, active model, and flood-frequency metadata.
  - name: data-sources
    description: External data sources and forecast cycles.
  - name: met
    description: Meteorological station and forcing time series access.
  - name: runs
    description: Hydrological run query and lifecycle operations.
  - name: tiles
    description: Raw vector and raster map tile delivery.
  - name: pipeline
    description: Forecast pipeline monitoring, jobs, logs, and queue state.
  - name: flood-alerts
    description: Flood alert summaries, rankings, segments, and timelines.
  - name: lineage
    description: Product and point lineage traceability.
  - name: layers
    description: Map layer discovery and valid-time navigation.
paths:
  /api/v1/basins:
    get:
      operationId: listBasins
      summary: List basins
      tags: [basins]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Basin list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Basin"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/basins/{basin_id}/versions:
    get:
      operationId: listBasinVersions
      summary: List versions for a basin
      tags: [basins]
      parameters:
        - $ref: "#/components/parameters/BasinId"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Basin version list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/BasinVersion"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/data-sources:
    get:
      operationId: listDataSources
      summary: List data sources
      tags: [data-sources]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Data source list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/DataSourcePage"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/data-sources/{source_id}/cycles:
    get:
      operationId: listForecastCycles
      summary: List forecast cycles for a data source
      tags: [data-sources]
      parameters:
        - $ref: "#/components/parameters/SourceId"
        - $ref: "#/components/parameters/FromTime"
        - $ref: "#/components/parameters/ToTime"
        - $ref: "#/components/parameters/CycleStatus"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Forecast cycle list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/ForecastCyclePage"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/models:
    get:
      operationId: listModels
      summary: List model instances
      tags: [models]
      parameters:
        - $ref: "#/components/parameters/BasinVersionIdQuery"
        - name: active
          in: query
          required: false
          schema:
            type: string
            enum: ["true", "false", "all"]
            default: "true"
          description: Filter by active model flag. Omitted defaults to active models only; use all for no active filter.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Model instance list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/ModelInstancePage"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/models/{model_id}:
    get:
      operationId: getModel
      summary: Get model instance detail
      tags: [models]
      parameters:
        - $ref: "#/components/parameters/ModelId"
      responses:
        "200":
          description: Model instance detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/ModelInstance"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/models/{model_id}/flood-frequency-curves:
    get:
      operationId: listFloodFrequencyCurves
      summary: List flood frequency curves for a model
      tags: [models]
      parameters:
        - $ref: "#/components/parameters/ModelId"
      responses:
        "200":
          description: Flood frequency curves
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/FloodFrequencyCurve"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/basin-versions/{basin_version_id}/river-network-versions:
    get:
      operationId: listRiverNetworkVersions
      summary: List river network versions for a basin version
      tags: [models]
      parameters:
        - $ref: "#/components/parameters/BasinVersionId"
      responses:
        "200":
          description: River network versions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/RiverNetworkVersion"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/models/{model_id}/active:
    put:
      operationId: setModelActive
      summary: Set active model flag
      tags: [models]
      parameters:
        - $ref: "#/components/parameters/ModelId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [active]
              properties:
                active:
                  type: boolean
                  description: >
                    Set model active flag. The legacy key name active_flag is
                    also accepted by the backend for backward compatibility.
      responses:
        "200":
          description: Updated model instance
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/ModelInstance"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/basin-versions/{basin_version_id}/river-segments/{segment_id}:
    get:
      operationId: getRiverSegment
      summary: Get river segment detail
      tags: [basins]
      parameters:
        - $ref: "#/components/parameters/BasinVersionId"
        - $ref: "#/components/parameters/SegmentId"
      responses:
        "200":
          description: River segment detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/RiverSegment"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/basin-versions/{basin_version_id}/river-segments/{segment_id}/forecast-series:
    get:
      operationId: getRiverSegmentForecastSeries
      summary: Get river segment forecast series
      tags: [basins]
      parameters:
        - $ref: "#/components/parameters/BasinVersionId"
        - $ref: "#/components/parameters/SegmentId"
        - $ref: "#/components/parameters/IssueTime"
        - name: variables
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated hydrological variables.
        - name: scenarios
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated scenario identifiers.
        - name: include_analysis
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Include analysis period data before the forecast window.
        - name: run_types
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated run types to include (e.g. forecast,hindcast).
      responses:
        "200":
          description: >
            River forecast time series. Returns RiverSeriesResponse for
            forecast-only requests, or SplicedForecastResponse when
            include_analysis=true splices analysis data before the forecast.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/RiverSeriesResponse"
                  - $ref: "#/components/schemas/SplicedForecastResponse"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/met/stations:
    get:
      operationId: listMetStations
      summary: List meteorological stations
      tags: [met]
      parameters:
        - $ref: "#/components/parameters/BasinVersionIdQuery"
        - $ref: "#/components/parameters/ModelIdQuery"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Meteorological station list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/MetStationPage"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/met/stations/{station_id}/series:
    get:
      operationId: getMetStationSeries
      summary: Get station forcing time series
      tags: [met]
      parameters:
        - $ref: "#/components/parameters/StationId"
        - name: forcing_version_id
          in: query
          required: false
          schema:
            type: string
        - name: variables
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated meteorological variables.
      responses:
        "200":
          description: Station time series
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/TimeseriesResponse"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/runs:
    get:
      operationId: listRuns
      summary: List hydrological runs
      tags: [runs]
      parameters:
        - name: basin_id
          in: query
          required: false
          schema:
            type: string
        - name: source
          in: query
          required: false
          schema:
            type: string
        - name: cycle_time
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RunStatus"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Run list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/HydroRunPage"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}:
    get:
      operationId: getRun
      summary: Get hydrological run detail
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Run detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/HydroRun"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}/retry:
    post:
      operationId: retryRun
      summary: Retry a failed or cancelled run
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/RunId"
        - $ref: "#/components/parameters/UserRole"
      responses:
        "200":
          description: Retry request accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/RetryRunResult"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}/cancel:
    post:
      operationId: cancelRun
      summary: Cancel an active run
      tags: [runs]
      parameters:
        - $ref: "#/components/parameters/RunId"
        - $ref: "#/components/parameters/UserRole"
      responses:
        "200":
          description: Cancel request accepted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/CancelRunResult"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/tiles/river-network/{basin_version_id}/{z}/{x}/{y}.pbf:
    get:
      operationId: getRiverNetworkTile
      summary: Get river network vector tile
      tags: [tiles]
      parameters:
        - $ref: "#/components/parameters/BasinVersionId"
        - $ref: "#/components/parameters/TileZ"
        - $ref: "#/components/parameters/TileX"
        - $ref: "#/components/parameters/TileY"
      responses:
        "200":
          description: Raw Mapbox vector tile
          content:
            application/x-protobuf:
              schema:
                type: string
                format: binary
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/tiles/hydro/{run_id}/{variable}/{valid_time}/{z}/{x}/{y}.pbf:
    get:
      operationId: getHydroTile
      summary: Get hydrological output vector tile
      tags: [tiles]
      parameters:
        - $ref: "#/components/parameters/RunId"
        - $ref: "#/components/parameters/Variable"
        - $ref: "#/components/parameters/ValidTimePath"
        - $ref: "#/components/parameters/TileZ"
        - $ref: "#/components/parameters/TileX"
        - $ref: "#/components/parameters/TileY"
      responses:
        "200":
          description: Raw Mapbox vector tile
          content:
            application/x-protobuf:
              schema:
                type: string
                format: binary
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/tiles/flood-return-period:
    get:
      operationId: getFloodReturnPeriodMap
      summary: Get flood return period GeoJSON map data
      description: >
        Returns a GeoJSON FeatureCollection for flood return-period map rendering.
        This release uses GeoJSON rather than `.pbf` vector tiles because MVT
        encoding and tile clipping require a PostGIS-specific implementation that
        is out of scope for the current release.
      tags: [tiles]
      parameters:
        - $ref: "#/components/parameters/RunIdQuery"
        - name: duration
          in: query
          required: false
          schema:
            type: string
            default: 1h
          description: Aggregation duration such as 1h, 3h, or 24h.
        - name: valid_time
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: Forecast valid time to render.
        - name: bbox
          in: query
          required: false
          schema:
            type: string
            pattern: "^-?\\d+(\\.\\d+)?,-?\\d+(\\.\\d+)?,-?\\d+(\\.\\d+)?,-?\\d+(\\.\\d+)?$"
          description: Optional minLon,minLat,maxLon,maxLat spatial filter.
        - name: return_period
          in: query
          required: false
          schema:
            type: number
            minimum: 0
          description: Optional minimum return period in years.
      responses:
        "200":
          description: GeoJSON flood return-period FeatureCollection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FloodReturnPeriodFeatureCollection"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/tiles/met/{product_id}/{variable}/{valid_time}/{z}/{x}/{y}.png:
    get:
      operationId: getMetTile
      summary: Get meteorological raster tile
      tags: [tiles]
      parameters:
        - $ref: "#/components/parameters/ProductId"
        - $ref: "#/components/parameters/Variable"
        - $ref: "#/components/parameters/ValidTimePath"
        - $ref: "#/components/parameters/TileZ"
        - $ref: "#/components/parameters/TileX"
        - $ref: "#/components/parameters/TileY"
      responses:
        "200":
          description: Raw PNG raster tile
          content:
            image/png:
              schema:
                type: string
                format: binary
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/pipeline/status:
    get:
      operationId: getPipelineStatus
      summary: Get pipeline status for a cycle
      tags: [pipeline]
      parameters:
        - $ref: "#/components/parameters/SourceQueryRequired"
        - $ref: "#/components/parameters/CycleTimeQueryRequired"
      responses:
        "200":
          description: Pipeline status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/PipelineStatus"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/pipeline/stages:
    get:
      operationId: listPipelineStages
      summary: List pipeline stages for a cycle
      tags: [pipeline]
      parameters:
        - $ref: "#/components/parameters/SourceQueryRequired"
        - $ref: "#/components/parameters/CycleTimeQueryRequired"
      responses:
        "200":
          description: Pipeline stage list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/PipelineStage"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/jobs:
    get:
      operationId: listPipelineJobs
      summary: List pipeline jobs
      tags: [pipeline]
      parameters:
        - $ref: "#/components/parameters/SourceQuery"
        - $ref: "#/components/parameters/CycleTimeQuery"
        - name: status
          in: query
          required: false
          schema:
            type: string
        - $ref: "#/components/parameters/ModelIdQuery"
        - name: stage
          in: query
          required: false
          schema:
            type: string
        - name: run_type
          in: query
          required: false
          schema:
            type: string
        - name: scenario
          in: query
          required: false
          schema:
            type: string
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            enum: [submitted_at, duration_seconds]
            default: submitted_at
        - name: sort_order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Pipeline job list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/PipelineJobPage"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/jobs/{job_id}/logs:
    get:
      operationId: getPipelineJobLogs
      summary: Get pipeline job logs
      tags: [pipeline]
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Pipeline job logs
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/JobLogs"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/queue/depth:
    get:
      operationId: getQueueDepth
      summary: Get queue depth by state
      tags: [pipeline]
      responses:
        "200":
          description: Queue depth
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/QueueDepth"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/metrics/stage-duration:
    get:
      operationId: getStageDurationMetrics
      summary: Get average stage duration by day
      tags: [pipeline]
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 7
      responses:
        "200":
          description: Stage duration metrics
          content:
            application/json:
