  /api/v1/tiles/flood-return-period:
    get:
      operationId: getFloodReturnPeriodMap
      summary: Get flood return period GeoJSON map data
      description: >
        Bounded GeoJSON compatibility endpoint for small or degraded
        flood-return-period rendering. National rendering must use the canonical
        `.pbf` MVT route discovered through layer metadata.
      tags: [tiles]
      parameters:
        - $ref: "#/components/parameters/RunIdQuery"
        - name: duration
          in: query
          required: false
          schema:
            type: string
            default: 1h
            enum: [1h, 3h, 6h, 24h, 72h, 7d]
          description: Supported return-period aggregation duration.
        - name: valid_time
          in: query
          required: true
          schema:
            type: string
            format: date-time
          description: Forecast valid time to render.
        - name: bbox
          in: query
          required: false
          schema:
            type: string
            pattern: "^-?\\d+(\\.\\d+)?,-?\\d+(\\.\\d+)?,-?\\d+(\\.\\d+)?,-?\\d+(\\.\\d+)?$"
          description: Optional minLon,minLat,maxLon,maxLat spatial filter.
        - name: return_period
          in: query
          required: false
          schema:
            type: number
            minimum: 0
          description: Optional minimum return period in years.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 10000
            default: 10000
          description: Maximum GeoJSON features to return; requests exceeding this budget fail with 413.
      responses:
        "200":
          description: GeoJSON flood return-period FeatureCollection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FloodReturnPeriodFeatureCollection"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
