        '200':
          description: Raw Mapbox vector tile
          headers:
            Cache-Control:
              schema:
                type: string
            ETag:
              schema:
                type: string
            X-Tile-Layer-ID:
              schema:
                type: string
            X-Tile-Checksum:
              schema:
                type: string
            X-Tile-Cache:
              schema:
                type: string
                enum:
                - hit
                - miss
                - bypass
            X-Tile-Cache-Key:
              schema:
                type: string
            X-MVT-Schema-Version:
              schema:
                type: string
          content:
            application/x-protobuf:
              schema:
                type: string
                format: binary
        '424':
          $ref: '#/components/responses/MvtLivePostgisUnavailable'
        4XX:
          $ref: '#/components/responses/Error'
        5XX:
          $ref: '#/components/responses/Error'
