          application/json:
            schema:
              $ref: '#/components/schemas/ModelLifecyclePayload'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Model Lifecycle Operation Api V1 Models  Model Id  Lifecycle
                  Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
