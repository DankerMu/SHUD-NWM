                type: object
                title: Response Create River Network Api V1 River Networks Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/basin-versions/{basin_version_id}/river-segments:
    get:
      tags:
      - models
      summary: List River Segments
      operationId: list_river_segments_api_v1_basin_versions__basin_version_id__river_segments_get
      parameters:
      - name: basin_version_id
        in: path
        required: true
        schema:
          type: string
          title: Basin Version Id
      - name: river_network_version_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: River Network Version Id
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Case-insensitive substring match over river_segment_id and
            name (backend-applied).
          title: Search
        description: Case-insensitive substring match over river_segment_id and name
          (backend-applied).
      - name: stream_order_min
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            minimum: 0
          - type: 'null'
          description: Inclusive lower bound on stream order (river_segment.segment_order).
          title: Stream Order Min
        description: Inclusive lower bound on stream order (river_segment.segment_order).
      - name: stream_order_max
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            minimum: 0
          - type: 'null'
          description: Inclusive upper bound on stream order (river_segment.segment_order).
          title: Stream Order Max
        description: Inclusive upper bound on stream order (river_segment.segment_order).
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 5000
          minimum: 1
          default: 500
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response List River Segments Api V1 Basin Versions  Basin Version
                  Id  River Segments Get
        '413':
          description: River segment GeoJSON payload budget exceeded.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/basin-versions/{basin_version_id}/river-segments/{segment_id}:
    get:
      tags:
      - models
      summary: Get River Segment
      operationId: get_river_segment_api_v1_basin_versions__basin_version_id__river_segments__segment_id__get
      parameters:
      - name: basin_version_id
        in: path
        required: true
        schema:
          type: string
          title: Basin Version Id
      - name: segment_id
        in: path
        required: true
        schema:
          type: string
          title: Segment Id
      - name: river_network_version_id
        in: query
        required: true
        schema:
          type: string
          minLength: 1
          title: River Network Version Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get River Segment Api V1 Basin Versions  Basin Version
                  Id  River Segments  Segment Id  Get
        '413':
          description: River segment GeoJSON payload budget exceeded.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/mesh-versions:
    post:
      tags:
      - models
      summary: Create Mesh Version
      operationId: create_mesh_version_api_v1_mesh_versions_post
      requestBody:
        content:
          application/json:
