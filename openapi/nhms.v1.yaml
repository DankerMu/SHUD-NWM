openapi: 3.1.0
info:
  title: NHMS API
  description: National Hydrological Modeling System API
  version: 0.1.0
paths:
  /api/v1/basins:
    post:
      tags:
      - models
      summary: Create Basin
      operationId: create_basin_api_v1_basins_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BasinCreatePayload'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Create Basin Api V1 Basins Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - models
      summary: List Basins
      operationId: list_basins_api_v1_basins_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 500
          minimum: 1
          default: 200
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      - name: has_display_product
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Has Display Product
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response List Basins Api V1 Basins Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/basins/{basin_id}/versions:
    post:
      tags:
      - models
      summary: Create Basin Version
      operationId: create_basin_version_api_v1_basins__basin_id__versions_post
      parameters:
      - name: basin_id
        in: path
        required: true
        schema:
          type: string
          title: Basin Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BasinVersionPayload'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Create Basin Version Api V1 Basins  Basin Id  Versions
                  Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - models
      summary: List Basin Versions
      operationId: list_basin_versions_api_v1_basins__basin_id__versions_get
      parameters:
      - name: basin_id
        in: path
        required: true
        schema:
          type: string
          title: Basin Id
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 500
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response List Basin Versions Api V1 Basins  Basin Id  Versions
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/river-networks:
    post:
      tags:
      - models
      summary: Create River Network
      operationId: create_river_network_api_v1_river_networks_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RiverNetworkCreatePayload'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
