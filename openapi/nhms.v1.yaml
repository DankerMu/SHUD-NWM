                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/LineageResponse"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/lineage/forcing-point:
    get:
      operationId: getForcingPointLineage
      summary: Get lineage for a forcing point value
      tags: [lineage]
      parameters:
        - name: forcing_version_id
          in: query
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/StationIdQuery"
        - $ref: "#/components/parameters/ValidTimeQuery"
        - $ref: "#/components/parameters/VariableQuery"
      responses:
        "200":
          description: Forcing point lineage
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/LineageResponse"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/lineage/product/{product_id}:
    get:
      operationId: getProductLineage
      summary: Get lineage for a product
      tags: [lineage]
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          description: Product lineage
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/LineageResponse"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/layers:
    get:
      operationId: listLayers
      summary: List available map layers
      tags: [layers]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Layer list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Layer"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/layers/{layer_id}/valid-times:
    get:
      operationId: listLayerValidTimes
      summary: List valid times for a map layer
      tags: [layers]
      parameters:
        - name: layer_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Layer valid times
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: array
                        items:
                          type: string
                          format: date-time
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT Bearer token. Auth implementation deferred to M1+."
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  parameters:
    BasinId:
      name: basin_id
      in: path
      required: true
      schema:
        type: string
    BasinVersionId:
      name: basin_version_id
      in: path
      required: true
      schema:
        type: string
    BasinVersionIdQuery:
      name: basin_version_id
      in: query
      required: false
      schema:
        type: string
    CycleStatus:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum:
          - discovered
          - downloading
          - raw_complete
          - canonical_ready
          - forcing_ready_partial
          - forcing_ready
          - forecast_running
          - parsed_partial
          - complete
          - published
          - failed_download
          - failed_convert
          - failed_forcing
          - failed_run
          - failed_parse
          - failed_publish
          - cancelled
    CycleTimeQuery:
      name: cycle_time
      in: query
      required: false
      schema:
        type: string
        format: date-time
    CycleTimeQueryRequired:
      name: cycle_time
      in: query
      required: true
      schema:
        type: string
        format: date-time
    FromTime:
      name: from
      in: query
      required: false
      schema:
        type: string
        format: date-time
    IssueTime:
      name: issue_time
      in: query
      required: false
      description: Use `latest` to resolve to the most recent available issue time, or provide an ISO 8601 datetime.
      schema:
        oneOf:
          - type: string
            enum: [latest]
          - type: string
            format: date-time
    JobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100
    ModelId:
      name: model_id
      in: path
      required: true
      schema:
        type: string
    ModelIdQuery:
      name: model_id
      in: query
      required: false
      schema:
        type: string
    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    ProductId:
      name: product_id
      in: path
      required: true
      schema:
        type: string
    RunId:
      name: run_id
      in: path
      required: true
      schema:
        type: string
    RunIdQuery:
      name: run_id
      in: query
      required: true
      schema:
        type: string
    SegmentId:
      name: segment_id
      in: path
      required: true
      schema:
        type: string
    SegmentIdQuery:
      name: segment_id
      in: query
      required: true
      schema:
        type: string
    SourceId:
      name: source_id
      in: path
      required: true
      schema:
        type: string
    SourceQuery:
      name: source
      in: query
      required: false
      schema:
        type: string
    SourceQueryRequired:
      name: source
      in: query
      required: true
      schema:
        type: string
    StationId:
      name: station_id
      in: path
      required: true
      schema:
        type: string
    StationIdQuery:
      name: station_id
      in: query
      required: true
      schema:
        type: string
    TileX:
      name: x
      in: path
      required: true
      schema:
        type: integer
        minimum: 0
    TileY:
      name: y
      in: path
      required: true
      schema:
        type: integer
        minimum: 0
    TileZ:
      name: z
      in: path
      required: true
      schema:
        type: integer
        minimum: 0
        maximum: 24
    ToTime:
      name: to
      in: query
      required: false
      schema:
        type: string
        format: date-time
    UserRole:
      name: X-User-Role
      in: header
      required: false
      schema:
        type: string
        enum: [operator, model_admin, sys_admin]
    ValidTimePath:
      name: valid_time
      in: path
      required: true
      schema:
        type: string
        format: date-time
    ValidTimeQuery:
      name: valid_time
      in: query
      required: false
      schema:
        type: string
        format: date-time
    Variable:
      name: variable
      in: path
      required: true
      schema:
        type: string
    VariableQuery:
      name: variable
      in: query
      required: true
      schema:
        type: string
  schemas:
    SuccessEnvelope:
      type: object
      description: Standard success envelope returned by API endpoints using the `_ok()` response pattern.
      required: [request_id, status]
      properties:
        request_id:
          type: string
          example: req_01J0NHMS
        status:
          type: string
          enum: [ok]
          example: ok
    ErrorResponse:
      type: object
      required: [request_id, status, error]
      properties:
        request_id:
          type: string
          example: req_01J0NHMS
        status:
          type: string
          enum: [error]
          example: error
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: NOT_FOUND
            message:
              type: string
              example: Requested resource was not found.
            details:
              type: object
              nullable: true
              additionalProperties: true
    Basin:
      type: object
      required: [basin_id, basin_name, created_at]
      properties:
        basin_id:
          type: string
        basin_name:
          type: string
        basin_group:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    BasinVersion:
      type: object
      required: [basin_version_id, basin_id, version_label, geom, active_flag, created_at]
      properties:
        basin_version_id:
          type: string
        basin_id:
          type: string
        version_label:
          type: string
        geom:
          $ref: "#/components/schemas/GeoJsonMultiPolygon"
        active_flag:
          type: boolean
        valid_from:
          type: string
          format: date-time
          nullable: true
        valid_to:
          type: string
          format: date-time
          nullable: true
        source_uri:
          type: string
          nullable: true
        checksum:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    ModelInstance:
      type: object
      required:
        - model_id
        - basin_version_id
        - river_network_version_id
        - mesh_version_id
        - calibration_version_id
        - shud_code_version
        - active_flag
        - model_package_uri
        - resource_profile
        - created_at
      properties:
        model_id:
          type: string
        basin_version_id:
          type: string
        river_network_version_id:
          type: string
        mesh_version_id:
          type: string
        calibration_version_id:
          type: string
        shud_code_version:
          type: string
        rshud_code_version:
          type: string
          nullable: true
        autoshud_code_version:
          type: string
          nullable: true
        active_flag:
          type: boolean
        container_image:
          type: string
          nullable: true
        model_package_uri:
          type: string
        resource_profile:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    ModelInstancePage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ModelInstance"
        total:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
          maximum: 500
        offset:
          type: integer
          minimum: 0
    RiverSegment:
      type: object
      required: [river_segment_id, river_network_version_id, geom, properties_json, created_at]
      properties:
        river_segment_id:
          type: string
        river_network_version_id:
          type: string
        segment_order:
          type: integer
          nullable: true
        downstream_segment_id:
          type: string
          nullable: true
        length_m:
          type: number
          nullable: true
        geom:
          $ref: "#/components/schemas/GeoJsonLineString"
        properties_json:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    MetStation:
      type: object
      required: [station_id, basin_version_id, geom, station_role, active_flag, created_at]
      properties:
        station_id:
          type: string
        basin_version_id:
          type: string
        station_name:
          type: string
          nullable: true
        geom:
          $ref: "#/components/schemas/GeoJsonPoint"
        elevation_m:
          type: number
          nullable: true
        station_role:
          type: string
        active_flag:
          type: boolean
        properties_json:
          type: object
          nullable: true
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    MetStationPage:
      type: object
      required: [items, total_count, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MetStation"
        total_count:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
    DataSource:
      type: object
      required: [source_id, source_name, source_type, status, adapter_name, config_json, created_at]
      properties:
        source_id:
          type: string
        source_name:
          type: string
        source_type:
          type: string
        status:
          type: string
        adapter_name:
          type: string
        config_json:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    DataSourcePage:
      type: object
      required: [items, total_count, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DataSource"
        total_count:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
    ForecastCycle:
      type: object
      required: [cycle_id, source_id, cycle_time, issue_time, status, created_at]
      properties:
        cycle_id:
          type: string
        source_id:
          type: string
        cycle_time:
          type: string
          format: date-time
        issue_time:
          type: string
          format: date-time
        status:
          type: string
        created_at:
          type: string
          format: date-time
    ForecastCyclePage:
      type: object
      required: [items, total_count, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ForecastCycle"
        total_count:
          type: integer
        limit:
          type: integer
        offset:
          type: integer
    ForcingVersion:
      type: object
      required:
        - forcing_version_id
        - model_id
        - source_id
        - start_time
        - end_time
        - station_count
        - forcing_package_uri
        - created_at
      properties:
        forcing_version_id:
          type: string
        model_id:
          type: string
        source_id:
          type: string
        cycle_time:
          type: string
          format: date-time
          nullable: true
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        station_count:
          type: integer
        forcing_package_uri:
          type: string
        checksum:
          type: string
          nullable: true
        lineage_json:
          type: object
          nullable: true
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    RunType:
      type: string
      enum: [analysis, forecast, hindcast]
    RunStatus:
      type: string
      enum:
        - created
        - staged
        - pending
        - submitted
        - running
        - succeeded
        - parsed
        - frequency_done
        - published
        - failed
        - cancelled
        - superseded
    HydroRun:
      type: object
      required:
        - run_id
        - run_type
        - scenario_id
        - model_id
        - basin_version_id
        - status
        - start_time
        - end_time
        - created_at
        - updated_at
      properties:
        run_id:
          type: string
        run_type:
          $ref: "#/components/schemas/RunType"
        scenario_id:
          type: string
        model_id:
          type: string
        basin_version_id:
          type: string
        forcing_version_id:
          type: string
          nullable: true
        init_state_id:
          type: string
          nullable: true
        source_id:
          type: string
          nullable: true
        cycle_time:
          type: string
          format: date-time
          nullable: true
        status:
          $ref: "#/components/schemas/RunStatus"
        slurm_job_id:
          type: string
          nullable: true
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        run_manifest_uri:
          type: string
          nullable: true
        output_uri:
          type: string
          nullable: true
        log_uri:
          type: string
          nullable: true
        error_code:
          type: string
          nullable: true
        error_message:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    HydroRunPage:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/HydroRun"
        total:
          type: integer
          minimum: 0
        total_count:
          type: integer
          minimum: 0
          description: Backward-compatible alias of total.
        limit:
          type: integer
          minimum: 1
          maximum: 200
        offset:
          type: integer
          minimum: 0
    RiverSeriesResponse:
      type: object
      required: [segment_id, issue_time, unit, series, frequency_thresholds]
      properties:
        segment_id:
          type: string
        issue_time:
          type: string
          format: date-time
          nullable: true
        unit:
          type: string
        series:
          type: array
          items:
            $ref: "#/components/schemas/SeriesSegment"
        frequency_thresholds:
          type: object
          allOf:
            - $ref: "#/components/schemas/FloodFrequencyThresholds"
          nullable: true
    SplicedForecastResponse:
      type: object
      description: >
        Returned when include_analysis=true splices analysis-period data
        before the forecast window into a unified segments array.
      required: [river_segment_id, segments, issue_time, variable, unit]
      properties:
        river_segment_id:
          type: string
        segments:
          type: array
          items:
            type: object
            required: [scenario, source, segment_role, data]
            properties:
              scenario:
                type: string
              scenario_id:
                type: string
                description: Canonical scenario identifier.
              source:
                type: string
              source_id:
                type: string
                nullable: true
                description: Forecast source identifier when available.
              cycle_time:
                type: string
                format: date-time
                nullable: true
                description: Forecast source cycle time when available.
              available_lead_hours:
                type: integer
                nullable: true
                description: Available forecast lead time in hours when available.
              segment_role:
                type: string
                enum: [past_7_days, future_7_days]
              data:
                type: array
                items:
                  type: object
                  required: [valid_time, value]
                  properties:
                    valid_time:
                      type: string
                      format: date-time
                    value:
                      type: number
        issue_time:
          type: string
          format: date-time
          nullable: true
        variable:
          type: string
        unit:
          type: string
        frequency_thresholds:
          type: object
