      - name: x
        in: path
        required: true
        schema:
          type: integer
          title: X
          minimum: 0
          maximum: 16383
        description: Web Mercator XYZ tile column. Global schema bounds are 0..16383
          for max zoom 14; each request also enforces 0 <= x < 2^z.
      - name: y
        in: path
        required: true
        schema:
          type: integer
          title: Y
          minimum: 0
          maximum: 16383
        description: Web Mercator XYZ tile row. Global schema bounds are 0..16383
          for max zoom 14; each request also enforces 0 <= y < 2^z.
