  /api/v1/models:
    post:
      tags:
      - models
      summary: Create Model
      operationId: create_model_api_v1_models_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelCreatePayload'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Create Model Api V1 Models Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - models
      summary: List Models
      operationId: list_models_api_v1_models_get
      parameters:
      - name: basin_version_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Basin Version Id
      - name: active
        in: query
        required: false
        schema:
          enum:
          - 'true'
          - 'false'
          - all
          type: string
          description: Filter by active model flag. Omitted defaults to active models
            only; use all for no active filter.
          default: 'true'
          title: Active
        description: Filter by active model flag. Omitted defaults to active models
          only; use all for no active filter.
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 500
          minimum: 1
          default: 100
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response List Models Api V1 Models Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
