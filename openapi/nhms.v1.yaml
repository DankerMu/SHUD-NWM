components:
  schemas:
    ActiveFlagPayload:
      properties:
        active:
          type: boolean
          title: Active
          description: Canonical active flag. The legacy active_flag key is accepted
            for compatibility.
      additionalProperties: false
      type: object
      required:
      - active
      title: ActiveFlagPayload
    ArraySubmitJobRequest:
      properties:
        job_type:
          type: string
          title: Job Type
        cycle_id:
          type: string
          title: Cycle Id
        stage_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Stage Name
        tasks:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Tasks
        manifest:
          additionalProperties: true
          type: object
          title: Manifest
      additionalProperties: true
      type: object
      required:
      - job_type
      - cycle_id
      title: ArraySubmitJobRequest
    BasinCreatePayload:
      properties:
        basin_id:
          type: string
          title: Basin Id
        basin_name:
          type: string
          title: Basin Name
        basin_group:
          anyOf:
          - type: string
          - type: 'null'
          title: Basin Group
        description:
          anyOf:
          - type: string
          - type: 'null'
          title: Description
        basin_version:
          $ref: '#/components/schemas/BasinVersionPayload'
      additionalProperties: false
      type: object
      required:
      - basin_id
      - basin_name
      - basin_version
      title: BasinCreatePayload
    BasinVersionPayload:
      properties:
        basin_version_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Basin Version Id
        version_label:
          type: string
          title: Version Label
        geom:
          anyOf:
          - additionalProperties: true
            type: object
          - type: string
          title: Geom
        active_flag:
          type: boolean
          title: Active Flag
          default: false
        valid_from:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Valid From
        valid_to:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Valid To
        source_uri:
          anyOf:
          - type: string
          - type: 'null'
          title: Source Uri
        checksum:
          anyOf:
          - type: string
          - type: 'null'
          title: Checksum
      additionalProperties: false
      type: object
      required:
      - version_label
      - geom
      title: BasinVersionPayload
    CrosswalkCreatePayload:
      properties:
        river_network_version_id:
          type: string
          title: River Network Version Id
        entries:
          items:
            $ref: '#/components/schemas/CrosswalkEntryPayload'
          type: array
          title: Entries
      additionalProperties: false
      type: object
      required:
      - river_network_version_id
      - entries
      title: CrosswalkCreatePayload
    CrosswalkEntryPayload:
      properties:
        river_segment_id:
          type: string
          title: River Segment Id
        source:
          type: string
          title: Source
        external_id:
          type: string
          title: External Id
        properties_json:
          additionalProperties: true
          type: object
          title: Properties Json
      additionalProperties: false
      type: object
      required:
      - river_segment_id
      - source
      - external_id
      title: CrosswalkEntryPayload
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    MeshVersionCreatePayload:
      properties:
        mesh_version_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Mesh Version Id
        basin_version_id:
          type: string
          title: Basin Version Id
        version_label:
          type: string
          title: Version Label
        mesh_uri:
          type: string
          title: Mesh Uri
        checksum:
          anyOf:
          - type: string
          - type: 'null'
          title: Checksum
        properties_json:
          additionalProperties: true
          type: object
          title: Properties Json
      additionalProperties: false
      type: object
      required:
      - basin_version_id
      - version_label
      - mesh_uri
      title: MeshVersionCreatePayload
    ModelCreatePayload:
      properties:
        model_id:
          type: string
          title: Model Id
        basin_version_id:
          type: string
          title: Basin Version Id
        river_network_version_id:
          type: string
          title: River Network Version Id
        mesh_version_id:
          type: string
          title: Mesh Version Id
        calibration_version_id:
          type: string
          title: Calibration Version Id
        shud_code_version:
          type: string
          title: Shud Code Version
        rshud_code_version:
          anyOf:
          - type: string
          - type: 'null'
          title: Rshud Code Version
        autoshud_code_version:
          anyOf:
          - type: string
          - type: 'null'
          title: Autoshud Code Version
        container_image:
          anyOf:
          - type: string
          - type: 'null'
          title: Container Image
        model_package_uri:
          type: string
          title: Model Package Uri
        active_flag:
          type: boolean
          title: Active Flag
          description: Must be false on creation; activate models through the lifecycle
            operation endpoint.
          default: false
        resource_profile:
          additionalProperties: true
          type: object
          title: Resource Profile
      additionalProperties: false
      type: object
      required:
      - model_id
      - basin_version_id
      - river_network_version_id
      - mesh_version_id
      - calibration_version_id
      - shud_code_version
      - model_package_uri
      title: ModelCreatePayload
    ModelLifecyclePayload:
      properties:
        operation:
          type: string
          enum:
          - activate
          - deactivate
          - switch_version
          - rollback_version
          - supersede
          - deprecate
          title: Operation
        previous_model_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Previous Model Id
        override_missing_active:
          type: boolean
          title: Override Missing Active
          default: false
        reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Reason
      additionalProperties: false
      type: object
      required:
      - operation
      title: ModelLifecyclePayload
    ResetRequest:
      properties:
        restore_defaults:
          type: boolean
          title: Restore Defaults
          default: false
        delay_to_running_seconds:
          anyOf:
          - type: number
            minimum: 0.0
          - type: 'null'
          title: Delay To Running Seconds
        delay_to_succeeded_seconds:
          anyOf:
          - type: number
            minimum: 0.0
          - type: 'null'
          title: Delay To Succeeded Seconds
        failure_rate:
          anyOf:
          - type: number
            maximum: 1.0
            minimum: 0.0
          - type: 'null'
          title: Failure Rate
        failure_seed:
          anyOf:
          - type: integer
          - type: 'null'
          title: Failure Seed
        force_fail_run_ids:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Force Fail Run Ids
      type: object
      title: ResetRequest
    RiverNetworkCreatePayload:
      properties:
        river_network_version_id:
          anyOf:
          - type: string
          - type: 'null'
          title: River Network Version Id
        basin_version_id:
          type: string
          title: Basin Version Id
        version_label:
          type: string
          title: Version Label
        segment_count:
          anyOf:
          - type: integer
          - type: 'null'
          title: Segment Count
        source_uri:
          anyOf:
          - type: string
          - type: 'null'
          title: Source Uri
        checksum:
          anyOf:
          - type: string
          - type: 'null'
          title: Checksum
        segments:
          items:
            $ref: '#/components/schemas/RiverSegmentPayload'
          type: array
          title: Segments
      additionalProperties: false
      type: object
      required:
      - basin_version_id
      - version_label
      - segments
      title: RiverNetworkCreatePayload
    RiverSegmentPayload:
      properties:
        river_segment_id:
          type: string
          title: River Segment Id
        segment_order:
          anyOf:
          - type: integer
          - type: 'null'
          title: Segment Order
        downstream_segment_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Downstream Segment Id
        length_m:
          anyOf:
          - type: number
          - type: 'null'
          title: Length M
        geom:
          anyOf:
          - additionalProperties: true
            type: object
          - type: string
          title: Geom
        properties_json:
          additionalProperties: true
          type: object
          title: Properties Json
      additionalProperties: false
      type: object
      required:
      - river_segment_id
      - geom
      title: RiverSegmentPayload
    SubmitJobRequest:
      properties:
        run_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Run Id
        model_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Model Id
        job_type:
          anyOf:
          - type: string
          - type: 'null'
          title: Job Type
        manifest:
          additionalProperties: true
          type: object
          title: Manifest
      additionalProperties: true
      type: object
      title: SubmitJobRequest
      description: 'Job submission request.


        The gateway accepts either a compact body with run_id/model_id or a manifest-shaped
        body

        where model_id is nested under model.model_id.'
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    SuccessEnvelope:
      type: object
      description: Standard success envelope returned by API endpoints using the `_ok()`
        response pattern.
      required:
      - request_id
      - status
      properties:
        request_id:
          type: string
          example: req_01J0NHMS
        status:
          type: string
          enum:
          - ok
          example: ok
    ErrorResponse:
      type: object
      required:
      - request_id
      - status
      - error
      properties:
        request_id:
          type: string
          example: req_01J0NHMS
        status:
          type: string
          enum:
          - error
          example: error
        error:
          type: object
          required:
          - code
          - message
          properties:
            code:
              type: string
              example: NOT_FOUND
            message:
              type: string
              example: Requested resource was not found.
            details:
              oneOf:
              - type: object
                nullable: true
                additionalProperties: true
              - type: array
                items:
                  $ref: '#/components/schemas/ValidationErrorDetail'
    ValidationErrorDetail:
      type: object
      required:
      - field
      - reason
      properties:
        field:
          type: string
        rejected_value:
          oneOf:
          - type: string
            nullable: true
          - type: number
          - type: boolean
          - type: object
            additionalProperties: true
          - type: array
            items: {}
        reason:
          type: string
      additionalProperties: true
    StationSeriesPoint:
      type: object
      required:
      - valid_time
      - value
      - quality_flag
      properties:
        valid_time:
          type: string
          format: date-time
        value:
          type: number
        quality_flag:
          type: string
          nullable: true
        source_id:
          type: string
          nullable: true
    StationSeriesStation:
      type: object
      required:
      - station_id
      - basin_version_id
      properties:
        station_id:
          type: string
        basin_version_id:
          type: string
        station_name:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        longitude:
          type: number
          nullable: true
        latitude:
          type: number
          nullable: true
        elevation_m:
          type: number
          nullable: true
        elevation:
          type: number
          nullable: true
        station_role:
          type: string
          nullable: true
        active_flag:
          type: boolean
          nullable: true
        properties_json:
          type: object
          nullable: true
          additionalProperties: true
        created_at:
          type: string
          format: date-time
          nullable: true
    StationSeriesMetadata:
      type: object
      required:
      - limit
      - returned_points
      - requested_from
      - requested_to
      - returned_from
      - returned_to
      - truncated
      properties:
        limit:
          type: integer
          minimum: 1
        returned_points:
          type: integer
          minimum: 0
        requested_from:
          type: string
          format: date-time
          nullable: true
        requested_to:
          type: string
          format: date-time
          nullable: true
        returned_from:
          type: string
          format: date-time
          nullable: true
        returned_to:
          type: string
          format: date-time
          nullable: true
        truncated:
          type: boolean
    StationSeries:
      type: object
      required:
      - variable
      - unit
      - native_resolution
      - points
      - truncated
      - metadata
      properties:
        variable:
          type: string
          enum:
          - PRCP
          - TEMP
          - RH
          - wind
          - Rn
        unit:
          type: string
          nullable: true
        native_resolution:
          type: string
          nullable: true
        source_id:
          type: string
          nullable: true
        cycle_time:
          type: string
          format: date-time
          nullable: true
        points:
          type: array
          items:
            $ref: '#/components/schemas/StationSeriesPoint'
        truncated:
          type: boolean
        metadata:
          $ref: '#/components/schemas/StationSeriesMetadata'
    StationSeriesResponse:
      type: object
      required:
      - station_id
      - station
      - forcing_version_id
      - source_id
      - limit
      - series
      properties:
        station_id:
          type: string
        station:
          $ref: '#/components/schemas/StationSeriesStation'
        forcing_version_id:
          type: string
        model_id:
          type: string
          nullable: true
        source_id:
          type: string
        cycle_time:
          type: string
          format: date-time
          nullable: true
        valid_time_start:
          type: string
          format: date-time
          nullable: true
        valid_time_end:
          type: string
          format: date-time
          nullable: true
        limit:
          type: integer
          minimum: 1
        requested_from:
          type: string
          format: date-time
          nullable: true
        requested_to:
          type: string
          format: date-time
          nullable: true
        series:
          type: array
          items:
            $ref: '#/components/schemas/StationSeries'
    QhhLatestUnavailableReason:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: string
        message:
          type: string
        run_id:
          type: string
          nullable: true
