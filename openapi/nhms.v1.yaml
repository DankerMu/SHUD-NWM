      additionalProperties: true
    QhhLatestAvailability:
      type: object
      required:
        - ready
        - unavailable_reasons
        - quality_flags
        - quality_notes
        - return_period_status
        - return_period_reasons
      properties:
        ready:
          type: boolean
        unavailable_reasons:
          type: array
          items:
            $ref: "#/components/schemas/QhhLatestUnavailableReason"
        quality_flags:
          type: array
          items:
            type: string
        quality_notes:
          type: array
          items:
            $ref: "#/components/schemas/QhhLatestQualityNote"
        return_period_status:
          type: string
          enum: [ready, unavailable]
          description: >-
            Supplemental flood return-period availability for this run. Current
            explicit schemas derive it from `product_quality.flood_return_period.quality_state`:
            `ready` maps to ready, while `degraded` and `unavailable` map to
            unavailable. Only missing or pre-explicit quality schemas fall back
            to the legacy row-count signal (`flood_return_period_rows > 0`).
            Independent of `ready`: a run with streamflow output but no
            return-period baseline still returns with `return_period_status =
            unavailable`. Never part of the blocking `unavailable_reasons` set.
        return_period_reasons:
          type: array
          description: >-
            Populated only when `return_period_status = unavailable`; carries the
            reason code RETURN_PERIOD_RESULT_UNAVAILABLE. Supplemental, not blocking.
          items:
            $ref: "#/components/schemas/QhhLatestUnavailableReason"
