    ValidTimeQuery:
      name: valid_time
      in: query
      required: false
      schema:
        type: string
        format: date-time
    # NOTE for grep-discipline maintainers: the description below intentionally
    # writes the retired identifiers as plain joined words. The split-string
    # sentinel pattern (used in source code so naive find-replace cannot
    # silently reintroduce the removed variant) is NOT used here — rendered
    # API documentation must read cleanly in Swagger UI / Redoc. Do NOT
    # find-replace these identifiers back into source code; that is what this
    # PR removed.
    HydroMvtVariable:
      name: variable
      in: path
      required: true
      description: |
        BREAKING (2026-06-20): the previously-supported `wl` hydrology variant
        (variable id `water_level`, layer id `water-level`) has been removed
        end-to-end. The enum is tightened to `[q_down]`. Clients still
        requesting either the legacy tile path or the legacy layer valid-times
        path receive HTTP 422 from the backend boundary. The frontend
        (sole external consumer) is regenerated against this enum and no
        longer advertises the retired layer in the M11 user selector.
      schema:
        type: string
        enum: [q_down]
    VariableQuery:
      name: variable
      in: query
      required: true
      schema:
        type: string
  schemas:
