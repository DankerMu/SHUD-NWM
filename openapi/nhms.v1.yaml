        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/met/stations:
    get:
      tags:
      - data-sources
      summary: List Met Stations
      operationId: list_met_stations_api_v1_met_stations_get
      parameters:
      - name: basin_version_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Basin Version Id
      - name: model_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Model Id
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Case-insensitive substring match over station_id and station
