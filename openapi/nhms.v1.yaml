  /api/v1/runs:
    get:
      tags:
      - forecast
      summary: List Runs
      operationId: list_runs_api_v1_runs_get
      parameters:
      - name: basin_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Basin Id
      - name: source
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Source
      - name: cycle_time
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Cycle Time
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response List Runs Api V1 Runs Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/mvp/qhh/latest-product:
    get:
      tags:
      - runs
      summary: Get latest QHH display product
      operationId: getQhhLatestProduct
      parameters:
      - name: source
        in: query
        required: true
        schema:
          type: string
          enum:
          - GFS
          - IFS
        description: MVP forecast source. Accepted case-insensitively and normalized
          to GFS or IFS.
      - name: basin_id
        in: query
        required: false
        schema:
          type: string
        description: Target basin id for the latest display product. Defaults to basins_qhh
          when omitted, preserving backward compatibility for /api/v1/mvp/qhh/latest-product
          and M22 cross-plane callers.
      - name: run_id
        in: query
        required: false
        schema:
          type: string
          minLength: 1
        description: Strict QHH run identity. If supplied, source, cycle_time, and
          model_id must also be supplied; the API will not fall back to source-only
          latest selection.
      - name: cycle_time
        in: query
        required: false
        schema:
          type: string
          format: date-time
        description: Strict QHH cycle time. If supplied, source, run_id, and model_id
          must also be supplied; the API will not fall back to source-only latest
          selection.
      - name: model_id
        in: query
        required: false
        schema:
          type: string
          minLength: 1
        description: Strict QHH model identity. If supplied, source, run_id, and cycle_time
          must also be supplied; the API will not fall back to source-only latest
          selection.
      - name: identity_only
        in: query
        required: false
        schema:
          type: boolean
          default: false
        description: 'Lightweight resolver for popups: returns run identity + cycle
          + horizon (+ recent cycles as available_issue_times) WITHOUT the expensive
          station/segment coverage computation. cycle_time may be supplied alone to
          select a specific cycle.'
      responses:
        '200':
          description: Latest QHH display product
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/SuccessEnvelope'
                - type: object
                  required:
                  - data
                  properties:
                    data:
                      $ref: '#/components/schemas/QhhLatestProduct'
        4XX:
          $ref: '#/components/responses/Error'
        5XX:
          $ref: '#/components/responses/Error'
  /api/v1/met/best-available:
    get:
      tags:
      - best-available
      summary: List Best Available
      operationId: list_best_available_api_v1_met_best_available_get
