            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/river-segment-crosswalks:
    post:
      tags:
      - models
      summary: Create River Segment Crosswalks
      operationId: create_river_segment_crosswalks_api_v1_river_segment_crosswalks_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrosswalkCreatePayload'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Create River Segment Crosswalks Api V1 River Segment
                  Crosswalks Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/basin-versions/{basin_version_id}/river-segments/{segment_id}/forecast-series:
    get:
      tags:
      - forecast
      summary: Get Forecast Series
      operationId: get_forecast_series_api_v1_basin_versions__basin_version_id__river_segments__segment_id__forecast_series_get
      parameters:
      - name: basin_version_id
        in: path
        required: true
        schema:
          type: string
          title: Basin Version Id
      - name: segment_id
        in: path
        required: true
        schema:
          type: string
          title: Segment Id
      - name: river_network_version_id
        in: query
        required: true
        schema:
          type: string
          minLength: 1
          description: River network version for the selected/list row; required because
            river_segment_id is only unique within a river network version.
          title: River Network Version Id
        description: River network version for the selected/list row; required because
          river_segment_id is only unique within a river network version.
      - name: issue_time
        in: query
        required: false
        schema:
          type: string
          default: latest
          title: Issue Time
      - name: variables
        in: query
        required: false
        schema:
          type: string
          default: q_down
          title: Variables
      - name: scenarios
        in: query
        required: false
        schema:
          type: string
          default: GFS
          title: Scenarios
      - name: include_analysis
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Include Analysis
      - name: run_types
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Run Types
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Forecast Series Api V1 Basin Versions  Basin Version
                  Id  River Segments  Segment Id  Forecast Series Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/runs/{run_id}:
