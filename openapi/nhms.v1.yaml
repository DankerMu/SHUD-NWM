                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/LineageResponse"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/layers:
    get:
      operationId: listLayers
      summary: List available map layers
      tags: [layers]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
        - name: run_id
          in: query
          required: false
          schema:
            type: string
          description: Optional concrete hydro_run.run_id/source reference used to scope layer metadata and cache identity.
      responses:
        "200":
          description: Layer list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Layer"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/layers/{layer_id}/valid-times:
    get:
      operationId: listLayerValidTimes
      summary: List bounded valid times for a map layer
      description: |
        Returns the newest valid-time window up to the server configured sample
        limit, sorted ascending for timeline controls. When run_id is supplied,
        discovery is scoped to that concrete hydro run/source identity. A true
        truncated flag means more distinct times were observed than are included
        in valid_times/items.

        BREAKING (2026-06-20): the route now returns HTTP 422 for any layer_id
        outside the canonical supported set
        `{discharge, flood-return-period, warning-level, river-network}`. The
        prior behaviour silently fell through to an empty `ValidTimeDiscovery`
        with HTTP 200 for unknown layer_ids; that fallback was removed together
        with the retired hydrology variant. The 422 envelope is the standard
        `ErrorResponse` shape with
        `error.code = "VALIDATION_ERROR"` and
        `error.details = { layer_id, supported }`.
      tags: [layers]
      parameters:
        - name: layer_id
          in: path
          required: true
          schema:
            type: string
        - name: run_id
          in: query
          required: false
          schema:
            type: string
          description: Optional concrete hydro_run.run_id/source reference used to scope valid-time discovery.
        - name: duration
          in: query
          required: false
          schema:
            type: string
            nullable: true
            enum: [1h, 3h, 6h, 24h, 72h, 7d]
          description: Optional flood return-period duration for flood-return-period and warning-level discovery; defaults to the current UI route identity of 1h.
      responses:
        "200":
          description: Layer valid times
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/LayerValidTimes"
        "422":
          description: |
            Validation error. Returned when `layer_id` is not one of the
            canonical supported set (`discharge`, `flood-return-period`,
            `warning-level`, `river-network`), or when `duration` is supplied
            for a layer that does not support it. `error.details` carries
            `{ layer_id, supported }` for the unsupported-layer case.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT Bearer token. Auth implementation deferred to M1+."
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    MvtLivePostgisUnavailable:
      description: Live PostGIS MVT is unavailable for this canonical tile route.
      content:
        application/json:
          schema:
            type: object
            required: [request_id, status, error]
            properties:
              request_id:
                type: string
              status:
                type: string
                enum: [error]
              error:
                type: object
                required: [code, message]
                properties:
                  code:
                    type: string
                    enum: [MVT_LIVE_POSTGIS_UNAVAILABLE]
                  message:
                    type: string
                  details:
                    type: object
                    nullable: true
                    additionalProperties: true
    ControlPlaneManualActionRequired:
      description: >
        Control-plane mutation is unavailable from a display_readonly API node;
        the authorized actor must perform the action from the compute_control
        runbook on node 22.
      content:
        application/json:
          schema:
            type: object
            required: [request_id, status, error]
            properties:
              request_id:
                type: string
              status:
                type: string
                enum: [error]
              error:
                type: object
                required: [code, message]
                properties:
                  code:
                    type: string
                    enum: [CONTROL_PLANE_MANUAL_ACTION_REQUIRED]
                  message:
                    type: string
                  details:
                    type: object
                    nullable: true
                    additionalProperties: true
    ControlPlaneQueueUnavailable:
      description: >
        Queue depth is unavailable from a display_readonly API node; the
        compute_control node exposes the live queue state.
      content:
        application/json:
          schema:
            type: object
            required: [request_id, status, error]
            properties:
              request_id:
                type: string
              status:
                type: string
                enum: [error]
              error:
                type: object
                required: [code, message]
                properties:
                  code:
                    type: string
                    enum: [CONTROL_PLANE_QUEUE_UNAVAILABLE]
                  message:
                    type: string
                  details:
                    type: object
                    nullable: true
                    additionalProperties: true
    JobLogError:
      description: >
        Pipeline job log retrieval failed. JOB_LOG_NOT_PUBLISHED and
        JOB_LOG_URI_UNSUPPORTED are 400 client errors; JOB_LOG_ACCESS_DENIED is
        403; JOB_LOG_NOT_FOUND is 404. All payloads use the canonical error
        envelope with redacted log identity details.
      content:
        application/json:
          schema:
            type: object
            required: [request_id, status, error]
            properties:
              request_id:
                type: string
              status:
                type: string
                enum: [error]
              error:
                type: object
                required: [code, message]
                properties:
                  code:
                    type: string
                    enum:
                      - JOB_LOG_NOT_PUBLISHED
                      - JOB_LOG_URI_UNSUPPORTED
                      - JOB_LOG_ACCESS_DENIED
                      - JOB_LOG_NOT_FOUND
                  message:
                    type: string
                  details:
                    type: object
                    nullable: true
                    additionalProperties: true
  parameters:
    BasinId:
      name: basin_id
      in: path
      required: true
      schema:
        type: string
    BasinVersionId:
      name: basin_version_id
      in: path
      required: true
      schema:
        type: string
    BasinVersionIdQuery:
      name: basin_version_id
      in: query
      required: false
      schema:
        type: string
    CycleStatus:
      name: status
