openapi: "3.0.3"
info:
  title: "National Hydrological Simulation System API"
  version: "1.0.0"
  license:
    name: "Proprietary"
    url: "https://example.com/proprietary-license"
  description: |
    NHMS API - 全国水文模拟系统。Auth implementation deferred to M1+.

    ## Roles
    - viewer: read-only access to public dashboards
    - analyst: read access to detailed data, timeseries, lineage
    - operator: trigger retries, cancel runs, manage pipeline
    - model_admin: create/update models, basin versions, calibration
    - sys_admin: full system administration
    - developer: development/debugging endpoints

    ## Non-Functional Requirements
    - List/query endpoints: P95 <= 200ms
    - Detail endpoints: P95 <= 100ms
    - Timeseries endpoints: P95 <= 500ms
    - Tile endpoints: P95 <= 300ms
    - Pipeline status: P95 <= 200ms
    - Flood alerts: P95 <= 300ms

    ## Conventions
    - All timestamps: ISO 8601 UTC
    - Pagination: limit/offset query parameters
    - Rate limiting: placeholder (not enforced in M0)
servers:
  - url: /
security:
  - BearerAuth: []
tags:
  - name: basins
    description: Basin, basin version, and river segment discovery.
  - name: models
    description: Model registry, active model, and flood-frequency metadata.
  - name: data-sources
    description: External data sources and forecast cycles.
  - name: met
    description: Meteorological station and forcing time series access.
  - name: runs
    description: Hydrological run query and lifecycle operations.
  - name: mvp
    description: MVP bootstrap APIs for QHH hydro-met display.
  - name: tiles
    description: Raw vector and raster map tile delivery.
  - name: pipeline
    description: Forecast pipeline monitoring, jobs, logs, and queue state.
  - name: runtime
    description: Runtime service role and capability discovery.
  - name: flood-alerts
    description: Flood alert summaries, rankings, segments, and timelines.
  - name: lineage
    description: Product and point lineage traceability.
  - name: layers
    description: Map layer discovery and valid-time navigation.
paths:
  /api/v1/basins:
    get:
      operationId: listBasins
      summary: List basins
      tags: [basins]
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 200
        - $ref: "#/components/parameters/Offset"
        - name: has_display_product
          in: query
          required: false
          description: >-
            When true, only basins that have at least one display-ready forecast
            run with non-null cycle_time are returned, aligned with the
            latest-product candidate caliber; the forcing/product source is not
            constrained. When omitted or false, all registered basins are
            returned (default behaviour).
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Basin list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Basin"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/basins/{basin_id}/versions:
    get:
      operationId: listBasinVersions
      summary: List versions for a basin
      tags: [basins]
      parameters:
        - $ref: "#/components/parameters/BasinId"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Basin version list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/BasinVersion"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/data-sources:
    get:
      operationId: listDataSources
      summary: List data sources
      tags: [data-sources]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Data source list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/DataSourcePage"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/data-sources/{source_id}/cycles:
    get:
      operationId: listForecastCycles
      summary: List forecast cycles for a data source
      tags: [data-sources]
      parameters:
        - $ref: "#/components/parameters/SourceId"
        - $ref: "#/components/parameters/FromTime"
        - $ref: "#/components/parameters/ToTime"
        - $ref: "#/components/parameters/CycleStatus"
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Forecast cycle list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/ForecastCyclePage"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/models:
    get:
      operationId: listModels
      summary: List model instances
      tags: [models]
      parameters:
        - $ref: "#/components/parameters/BasinVersionIdQuery"
        - name: active
          in: query
          required: false
          schema:
            type: string
            enum: ["true", "false", "all"]
            default: "true"
          description: Filter by active model flag. Omitted defaults to active models only; use all for no active filter.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Model instance list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/ModelInstancePage"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/models/{model_id}:
    get:
      operationId: getModel
      summary: Get model instance detail
      tags: [models]
      parameters:
        - $ref: "#/components/parameters/ModelId"
      responses:
        "200":
          description: Model instance detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/ModelInstance"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/models/{model_id}/flood-frequency-curves:
    get:
      operationId: listFloodFrequencyCurves
      summary: List flood frequency curves for a model
      tags: [models]
      parameters:
        - $ref: "#/components/parameters/ModelId"
      responses:
        "200":
          description: Flood frequency curves
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/FloodFrequencyCurve"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/basin-versions/{basin_version_id}/river-network-versions:
    get:
      operationId: listRiverNetworkVersions
      summary: List river network versions for a basin version
      tags: [models]
      parameters:
        - $ref: "#/components/parameters/BasinVersionId"
      responses:
        "200":
          description: River network versions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/RiverNetworkVersion"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/basin-versions/{basin_version_id}/river-segments:
    get:
      operationId: listRiverSegments
      summary: List river segments as GeoJSON
      description: >-
        Segment-level features sliced from each parent reach polyline via
        PostGIS ST_LineSubstring (Path C). Reach geometry is stored in
        core.river_segment, derived from gis/river.shp (single-part,
        flow-ordered) per the PR-2 contract; segment slices are produced at
        request time using the (iRiv, iEle) crosswalk so the historical
        segment-level frontend contract is preserved without storing
        fabricated cross-gap bridge polylines.
      tags: [models]
      parameters:
        - $ref: "#/components/parameters/BasinVersionId"
        - name: river_network_version_id
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Case-insensitive substring match over river_segment_id and name (backend-applied).
        - name: stream_order_min
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: Inclusive lower bound on stream order (river_segment.segment_order).
        - name: stream_order_max
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
          description: Inclusive upper bound on stream order (river_segment.segment_order).
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 5000
            default: 500
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: River segment GeoJSON feature collection
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/RiverSegmentFeatureCollection"
        "4XX":
          $ref: "#/components/responses/Error"
        "413":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/models/{model_id}/active:
    put:
      operationId: setModelActive
      summary: Set active model flag through lifecycle operation
      tags: [models]
      parameters:
        - $ref: "#/components/parameters/ModelId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [active]
              properties:
                active:
                  type: boolean
                  description: >
                    Set model active flag. The legacy key name active_flag is
                    also accepted by the backend for backward compatibility.
      responses:
        "200":
          description: Lifecycle operation result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/ModelLifecycleResult"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/models/{model_id}/preflight:
    post:
      operationId: preflightModelLifecycle
      summary: Preflight model lifecycle operation
      tags: [models]
      parameters:
        - $ref: "#/components/parameters/ModelId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModelLifecycleRequest"
      responses:
        "200":
          description: Model lifecycle preflight summary
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/ModelOperationPreflight"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/models/{model_id}/lifecycle:
    post:
      operationId: modelLifecycleOperation
      summary: Execute model lifecycle operation
      tags: [models]
      parameters:
        - $ref: "#/components/parameters/ModelId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModelLifecycleRequest"
      responses:
        "200":
          description: Model lifecycle operation result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/ModelLifecycleResult"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/basin-versions/{basin_version_id}/river-segments/{segment_id}:
    get:
      operationId: getRiverSegment
      summary: Get river segment detail
      tags: [basins]
      parameters:
        - $ref: "#/components/parameters/BasinVersionId"
        - $ref: "#/components/parameters/SegmentId"
        - name: river_network_version_id
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          description: River network version for the selected/list row; required because river_segment_id is only unique within a river network version.
      responses:
        "200":
          description: River segment detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/RiverSegment"
        "4XX":
          $ref: "#/components/responses/Error"
        "413":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/basin-versions/{basin_version_id}/river-segments/{segment_id}/forecast-series:
    get:
      operationId: getRiverSegmentForecastSeries
      summary: Get river segment forecast series
      tags: [basins]
      parameters:
        - $ref: "#/components/parameters/BasinVersionId"
        - $ref: "#/components/parameters/SegmentId"
        - name: river_network_version_id
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          description: River network version for the selected/list row; required because river_segment_id is only unique within a river network version.
        - $ref: "#/components/parameters/IssueTime"
        - name: variables
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated hydrological variables.
        - name: scenarios
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated scenario identifiers.
        - name: include_analysis
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Include analysis period data before the forecast window.
        - name: run_types
          in: query
          required: false
          schema:
            type: string
          description: Comma-separated run types to include (e.g. forecast,hindcast).
      responses:
        "200":
          description: >
            River forecast time series. Returns RiverSeriesResponse for
            forecast-only requests, or SplicedForecastResponse when
            include_analysis=true splices analysis data before the forecast.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/RiverSeriesResponse"
                  - $ref: "#/components/schemas/SplicedForecastResponse"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/met/stations:
    get:
      operationId: listMetStations
      summary: List meteorological stations
      tags: [met]
      parameters:
        - $ref: "#/components/parameters/BasinVersionIdQuery"
        - $ref: "#/components/parameters/ModelIdQuery"
        - name: search
          in: query
          required: false
          schema:
            type: string
          description: Case-insensitive substring match over station_id and station name (backend-applied).
        - name: variables
          in: query
          required: false
          style: form
          explode: true
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
          description: >
            Variable coverage filter. Repeat or comma-separate values
            (PRCP, TEMP, RH, wind, Rn, Press). Applied only when model_id is set;
            otherwise reported unavailable in the response filters block.
        - name: qc_status
          in: query
          required: false
          schema:
            type: string
          description: >
            QC status filter (advisory). Reported unavailable in the response
            filters block because QC fields are not present on the station inventory.
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Meteorological station list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/MetStationPage"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/met/stations/{station_id}/series:
    get:
      operationId: getMetStationSeries
      summary: Get station forcing time series
      tags: [met]
      parameters:
        - $ref: "#/components/parameters/StationId"
        - name: forcing_version_id
          in: query
          required: false
          deprecated: true
          description: Deprecated compatibility parameter. The disk-only route ignores this value when model_id, source_id, and cycle_time are supplied; by itself it no longer selects DB-backed series.
          schema:
            type: string
            minLength: 1
        - name: model_id
          in: query
          required: false
          schema:
            type: string
            minLength: 1
        - name: source_id
          in: query
          required: false
          schema:
            type: string
            minLength: 1
        - name: cycle_time
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: variables
          in: query
          required: false
          style: form
          explode: true
          schema:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
          description: Station forcing variables. Repeat the parameter or provide comma-separated values. Public station-series variables are PRCP, TEMP, RH, wind, and Rn.
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 10000
      responses:
        "200":
          description: Station time series
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/StationSeriesResponse"
        "4XX":
          description: Station series client error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                stationNotFound:
                  summary: STATION_NOT_FOUND
                  value:
                    request_id: req_01J0NHMS
                    status: error
                    error:
                      code: STATION_NOT_FOUND
                      message: Station not found.
                      details: null
                missingRequiredFilter:
                  summary: MISSING_REQUIRED_FILTER
                  value:
                    request_id: req_01J0NHMS
                    status: error
                    error:
                      code: MISSING_REQUIRED_FILTER
                      message: forcing_version_id or model_id, source_id, and cycle_time are required for station series queries.
                      details:
                        required_alternatives:
                          - [forcing_version_id]
                          - [model_id, source_id, cycle_time]
                stationForcingFileNotFound:
                  summary: STATION_FORCING_FILE_NOT_FOUND
                  value:
                    request_id: req_01J0NHMS
                    status: error
                    error:
                      code: STATION_FORCING_FILE_NOT_FOUND
                      message: Station forcing file not found.
                      details: null
        "5XX":
          description: Station series server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                stationForcingFilenameMissing:
                  summary: STATION_FORCING_FILENAME_MISSING
                  value:
                    request_id: req_01J0NHMS
                    status: error
                    error:
                      code: STATION_FORCING_FILENAME_MISSING
                      message: Station forcing filename is missing.
                      details: null
                stationForcingFileMalformed:
                  summary: STATION_FORCING_FILE_MALFORMED
                  value:
                    request_id: req_01J0NHMS
                    status: error
                    error:
                      code: STATION_FORCING_FILE_MALFORMED
                      message: Station forcing file is malformed.
                      details: null
  /api/v1/mvp/qhh/latest-product:
    get:
      operationId: getQhhLatestProduct
      summary: Get latest QHH display product
      tags: [runs]
      parameters:
        - name: source
          in: query
          required: true
          schema:
            type: string
            enum: [GFS, IFS]
          description: MVP forecast source. Accepted case-insensitively and normalized to GFS or IFS.
        - name: basin_id
          in: query
          required: false
          schema:
            type: string
          description: Target basin id for the latest display product. Defaults to basins_qhh when omitted, preserving backward compatibility for /api/v1/mvp/qhh/latest-product and M22 cross-plane callers.
        - name: run_id
          in: query
          required: false
          schema:
            type: string
            minLength: 1
          description: Strict QHH run identity. If supplied, source, cycle_time, and model_id must also be supplied; the API will not fall back to source-only latest selection.
        - name: cycle_time
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Strict QHH cycle time. If supplied, source, run_id, and model_id must also be supplied; the API will not fall back to source-only latest selection.
        - name: model_id
          in: query
          required: false
          schema:
            type: string
            minLength: 1
          description: Strict QHH model identity. If supplied, source, run_id, and cycle_time must also be supplied; the API will not fall back to source-only latest selection.
        - name: identity_only
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: "Lightweight resolver for popups: returns run identity + cycle + horizon (+ recent cycles as available_issue_times) WITHOUT the expensive station/segment coverage computation. cycle_time may be supplied alone to select a specific cycle."
      responses:
        "200":
          description: Latest QHH display product
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/QhhLatestProduct"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/runs:
    get:
      operationId: listRuns
      summary: List hydrological runs
      tags: [runs]
      parameters:
        - name: basin_id
          in: query
          required: false
          schema:
            type: string
        - name: source
          in: query
          required: false
          schema:
            type: string
        - name: cycle_time
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RunStatus"
        - name: flood_product_ready
          in: query
          required: false
          description: When true, returns only frequency_done/published runs with ready flood return-period products and warning thresholds.
          schema:
            type: boolean
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Offset"
      responses:
        "200":
          description: Run list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        $ref: "#/components/schemas/HydroRunPage"
        "4XX":
          $ref: "#/components/responses/Error"
        "5XX":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}:
    get:
      operationId: getRun
