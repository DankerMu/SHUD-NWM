                  message:
                    type: string
                  details:
                    type: object
                    nullable: true
                    additionalProperties: true
    ControlPlaneQueueUnavailable:
      description: Queue depth is unavailable from a display_readonly API node; the
        compute_control node exposes the live queue state.
      content:
        application/json:
          schema:
            type: object
            required:
            - request_id
            - status
            - error
            properties:
              request_id:
                type: string
              status:
                type: string
                enum:
                - error
              error:
                type: object
                required:
                - code
                - message
                properties:
                  code:
                    type: string
                    enum:
                    - CONTROL_PLANE_QUEUE_UNAVAILABLE
                  message:
                    type: string
                  details:
                    type: object
                    nullable: true
                    additionalProperties: true
